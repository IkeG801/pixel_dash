        // Back button
        ctx.fillStyle = sec;
        ctx.fillRect(W / 2 - 70, H - 60, 140, 40);
        ctx.fillStyle = txt;
        ctx.font = 'bold 14px Silkscreen';
        ctx.textAlign = 'center';
        ctx.fillText('[ SPACE TO BACK ]', W / 2, H - 35);

        if (keys[' '] || keys['Enter']) {
          keys[' '] = false;
          keys['Enter'] = false;
          state = 'menu';
        }

        drawTouchControls();
        return;
      }

      // Level Editor screen
      if (state === 'editor') {
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);
        
        // Draw grid background
        ctx.strokeStyle = txt + '15';
        ctx.lineWidth = 1;
        const gridSize = 32;
        for (let x = -editorPanX % gridSize; x < W; x += gridSize) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, H);
          ctx.stroke();
        }
        for (let y = -editorPanY % gridSize; y < H; y += gridSize) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(W, y);
          ctx.stroke();
        }
        
        // Draw editor content with pan/zoom
        ctx.save();
        ctx.translate(editorPanX, editorPanY);
        ctx.scale(editorZoom, editorZoom);
        
        // Draw platforms
        editorLevel.platforms.forEach((pl, idx) => {
          ctx.fillStyle = editorSelected?.type === 'platform' && editorSelected?.index === idx ? accent : '#a78baf';
          ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
          ctx.strokeStyle = editorSelected?.type === 'platform' && editorSelected?.index === idx ? '#ffff00' : '#8b7b9f';
          ctx.lineWidth = 2;
          ctx.strokeRect(pl.x, pl.y, pl.w, pl.h);
          
          // Type indicator
          ctx.fillStyle = txt;
          ctx.font = '10px Silkscreen';
          ctx.fillText(pl.type, pl.x + 4, pl.y + 12);
        });
        
        // Draw coins
        editorLevel.coins.forEach((c, idx) => {
          ctx.fillStyle = editorSelected?.type === 'coin' && editorSelected?.index === idx ? accent : '#ffcc00';
          ctx.beginPath();
          ctx.arc(c.x + 8, c.y + 8, 8, 0, Math.PI * 2);
          ctx.fill();
        });
        
        // Draw spikes
        editorLevel.spikes.forEach((s, idx) => {
          ctx.fillStyle = editorSelected?.type === 'spike' && editorSelected?.index === idx ? accent : '#8b6f47';
          ctx.beginPath();
          ctx.moveTo(s.x + s.w / 2, s.y);
          ctx.lineTo(s.x + s.w, s.y + s.h);
          ctx.lineTo(s.x, s.y + s.h);
          ctx.closePath();
          ctx.fill();
        });
        
        // Draw obstacles (moving hazards)
        editorLevel.obstacles.forEach((o, idx) => {
          ctx.fillStyle = editorSelected?.type === 'obstacle' && editorSelected?.index === idx ? accent : '#ff3333';
          ctx.fillRect(o.x, o.y, o.w, o.h);
          ctx.strokeStyle = '#ffff00';
          ctx.lineWidth = 1;
          ctx.strokeRect(o.x, o.y, o.w, o.h);
        });
        
        // Draw powerups
        editorLevel.powerups.forEach((p, idx) => {
          let color = '#0066ff';
          if (p.type === 'coinmultiplier') color = '#ffff00';
          else if (p.type === 'flymode') color = '#ff0088';
          
          ctx.fillStyle = editorSelected?.type === 'powerup' && editorSelected?.index === idx ? accent : color;
          ctx.fillRect(p.x, p.y, p.w, p.w);
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 1;
          ctx.strokeRect(p.x, p.y, p.w, p.w);
        });
        
        // Draw start marker
        ctx.fillStyle = editorSelected?.type === 'start' ? '#ffff00' : '#00ff00';
        ctx.fillRect(editorLevel.startX - 15, editorLevel.startY - 15, 30, 30);
        ctx.strokeStyle = editorSelected?.type === 'start' ? '#ffff00' : '#00aa00';
        ctx.lineWidth = 2;
        ctx.strokeRect(editorLevel.startX - 15, editorLevel.startY - 15, 30, 30);
        ctx.fillStyle = '#000';
        ctx.font = 'bold 10px Silkscreen';
        ctx.textAlign = 'center';
        ctx.fillText('S', editorLevel.startX, editorLevel.startY + 3);
        
        // Draw finish marker
        ctx.fillStyle = editorSelected?.type === 'finish' ? '#ffff00' : accent;
        ctx.fillRect(editorLevel.finishX - 15, editorLevel.finishY - 15, 30, 30);
        ctx.strokeStyle = editorSelected?.type === 'finish' ? '#ffff00' : '#ffaa00';
        ctx.lineWidth = 2;
        ctx.strokeRect(editorLevel.finishX - 15, editorLevel.finishY - 15, 30, 30);
        ctx.fillStyle = '#000';
        ctx.font = 'bold 10px Silkscreen';
        ctx.textAlign = 'center';
        ctx.fillText('F', editorLevel.finishX, editorLevel.finishY + 3);
        
        ctx.restore();
        
        // Top toolbar
        const toolbarY = 10;
        const toolSize = 40;
        const toolSpacing = 45;
        let toolX = 15;
        
        const tools = [
          { name: 'platform', label: 'Plat' },
          { name: 'coin', label: 'Coin' },
          { name: 'spike', label: 'Spike' },
          { name: 'obstacle', label: 'Obs' },
          { name: 'powerup', label: 'Power' },
          { name: 'start', label: 'Start' },
          { name: 'finish', label: 'End' },
          { name: 'delete', label: 'Del' }
        ];
        
        tools.forEach(tool => {
          const isSelected = editorTool === tool.name;
          ctx.fillStyle = isSelected ? accent : sec + 'cc';
          ctx.fillRect(toolX, toolbarY, toolSize, toolSize);
          ctx.strokeStyle = isSelected ? '#ffff00' : txt;
          ctx.lineWidth = 2;
          ctx.strokeRect(toolX, toolbarY, toolSize, toolSize);
          
          ctx.fillStyle = txt;
          ctx.font = '9px Silkscreen';
          ctx.textAlign = 'center';
          ctx.fillText(tool.label, toolX + toolSize / 2, toolbarY + toolSize / 2 + 4);
          
          toolX += toolSpacing;
        });
        
        // Platform type selector (if platform tool selected)
        if (editorTool === 'platform') {
          ctx.fillStyle = txt;
          ctx.font = 'bold 12px Silkscreen';
          ctx.textAlign = 'left';
          ctx.fillText('Type:', toolX + 10, toolbarY + 20);
          
          const types = ['Normal', 'Crumbling', 'Bouncy', 'Ice', 'Slime'];
          types.forEach((t, i) => {
            const typeX = toolX + 10 + i * 60;
            const isSelectedType = editorPlatformType === i;
            ctx.fillStyle = isSelectedType ? accent : sec + 'cc';
            ctx.fillRect(typeX, toolbarY + 28, 50, 20);
            ctx.strokeStyle = isSelectedType ? '#ffff00' : txt;
            ctx.lineWidth = 1;
            ctx.strokeRect(typeX, toolbarY + 28, 50, 20);
            
            ctx.fillStyle = txt;
            ctx.font = '8px Silkscreen';
            ctx.textAlign = 'center';
            ctx.fillText(t, typeX + 25, toolbarY + 42);
          });
        }
        
        // Bottom info & buttons
        const infoY = H - 45;
        ctx.fillStyle = txt;
        ctx.font = '12px Silkscreen';
        ctx.textAlign = 'left';
        ctx.fillText(`Tool: ${editorTool} | Click & drag to place | Ctrl+Z undo | Right-click to select/delete`, 20, infoY);
        
        // Save & Test buttons
        ctx.fillStyle = accent;
        ctx.fillRect(W / 2 - 140, infoY + 8, 60, 28);
        ctx.fillStyle = '#000';
        ctx.font = 'bold 11px Silkscreen';
        ctx.textAlign = 'center';
        ctx.fillText('TEST', W / 2 - 110, infoY + 27);
        
        ctx.fillStyle = '#10b981';
        ctx.fillRect(W / 2 - 70, infoY + 8, 60, 28);
        ctx.fillStyle = '#000';
        ctx.fillText('SAVE', W / 2 - 40, infoY + 27);
        
        ctx.fillStyle = sec;
        ctx.fillRect(W / 2, infoY + 8, 60, 28);
        ctx.fillStyle = txt;
        ctx.fillText('BACK', W / 2 + 30, infoY + 27);
        
        // Handle editor input
        if (keys['Escape']) {
          keys['Escape'] = false;
          state = 'menu';
        }
        
        // Tool selection
        if (keys['1']) { editorTool = 'platform'; keys['1'] = false; }
        if (keys['2']) { editorTool = 'coin'; keys['2'] = false; }
        if (keys['3']) { editorTool = 'spike'; keys['3'] = false; }
        if (keys['4']) { editorTool = 'obstacle'; keys['4'] = false; }
        if (keys['5']) { editorTool = 'powerup'; keys['5'] = false; }
        if (keys['0']) { editorTool = 'delete'; keys['0'] = false; }
        
        // Platform type cycling
        if (editorTool === 'platform') {
          if (keys['[']) { editorPlatformType = Math.max(0, editorPlatformType - 1); keys['['] = false; }
          if (keys[']']) { editorPlatformType = Math.min(4, editorPlatformType + 1); keys[']'] = false; }
        }
        
        // Pan controls
        if (keys['ArrowLeft'] || keys['a']) { editorPanX += 15; keys['ArrowLeft'] = false; keys['a'] = false; }
        if (keys['ArrowRight'] || keys['d']) { editorPanX -= 15; keys['ArrowRight'] = false; keys['d'] = false; }
        if (keys['ArrowUp'] || keys['w']) { editorPanY += 15; keys['ArrowUp'] = false; keys['w'] = false; }
        if (keys['ArrowDown'] || keys['s']) { editorPanY -= 15; keys['ArrowDown'] = false; keys['s'] = false; }
        
        // Zoom controls
        if (keys['+'] || keys['=']) { editorZoom = Math.min(2, editorZoom + 0.1); keys['+'] = false; keys['='] = false; }
        if (keys['-']) { editorZoom = Math.max(0.5, editorZoom - 0.1); keys['-'] = false; }
        
        return;
      }

      // Achievements screen
      if (state === 'achievements') {
        ctx.textAlign = 'center';
        ctx.fillStyle = surf;
        ctx.font = 'bold 40px Silkscreen';
        ctx.fillText('ACHIEVEMENTS', W / 2, 60);

        const achArray = Object.values(ACHIEVEMENTS);
        const unlockedList = playerData.unlockedAchievements ? playerData.unlockedAchievements.split(',').map(a => a.trim()) : [];
        const unlockedCount = unlockedList.length;

        ctx.fillStyle = txt;
        ctx.font = 'bold 14px Silkscreen';
        ctx.fillText(`Unlocked: ${unlockedCount} / ${achArray.length}`, W / 2, 100);

        // Draw achievements as cards
        const cardWidth = Math.min(W - 40, 350);
        const cardHeight = 80;
        const startY = 130;
        const maxVisible = Math.floor((H - 230) / (cardHeight + 15));

        achArray.slice(0, maxVisible).forEach((ach, idx) => {
          const y = startY + idx * (cardHeight + 15);
          const isUnlocked = unlockedList.includes(ach.id);

          // Draw card background
          ctx.fillStyle = isUnlocked ? accent + '30' : '#666666' + '20';
          ctx.fillRect(W / 2 - cardWidth / 2, y, cardWidth, cardHeight);
          ctx.strokeStyle = isUnlocked ? accent : '#999999';
          ctx.lineWidth = 2;
          ctx.strokeRect(W / 2 - cardWidth / 2, y, cardWidth, cardHeight);

          // Draw trophy/lock icon
          ctx.font = 'bold 28px Silkscreen';
          ctx.textAlign = 'left';
          ctx.fillStyle = isUnlocked ? accent : '#666666';
          ctx.fillText(isUnlocked ? '🏆' : '🔒', W / 2 - cardWidth / 2 + 15, y + 50);

          // Draw achievement name and description
          ctx.textAlign = 'left';
          ctx.fillStyle = isUnlocked ? txt : '#999999';
          ctx.font = 'bold 13px Silkscreen';
          ctx.fillText(ach.name, W / 2 - cardWidth / 2 + 60, y + 25);
          ctx.font = '11px Silkscreen';
          ctx.fillText(ach.description, W / 2 - cardWidth / 2 + 60, y + 45);
          ctx.fillText('+10 Points', W / 2 - cardWidth / 2 + 60, y + 60);
        });

        // Back button
        ctx.fillStyle = sec;
        ctx.fillRect(W / 2 - 70, H - 60, 140, 40);
        ctx.fillStyle = txt;
        ctx.font = 'bold 14px Silkscreen';
        ctx.textAlign = 'center';
        ctx.fillText('[ SPACE TO BACK ]', W / 2, H - 35);

        if (keys[' '] || keys['Enter']) {
          keys[' '] = false;
          keys['Enter'] = false;
          state = 'menu';
        }

        drawTouchControls();
        return;
      }
    }

    function drawTouchControls() {
      if (!('ontouchstart' in window)) return;
      ctx.globalAlpha = 0.25;
      const s = config.surface_color || defaultConfig.surface_color;
      const bh = 80, by = canvas.height - bh;

      // Left
      ctx.fillStyle = touchLeft ? s : s + '80';
      ctx.fillRect(0, by, canvas.width / 3, bh);
      ctx.fillStyle = '#fff';
      ctx.font = '24px Silkscreen';
      ctx.textAlign = 'center';
      ctx.fillText('◀', canvas.width / 6, by + 50);

      // Right
      ctx.fillStyle = touchRight ? s : s + '80';
      ctx.fillRect(canvas.width / 3, by, canvas.width / 3, bh);
      ctx.fillStyle = '#fff';
      ctx.fillText('▶', canvas.width / 2, by + 50);

      // Jump
      ctx.fillStyle = touchJump ? s : s + '80';
      ctx.fillRect(canvas.width * 2 / 3, by, canvas.width / 3, bh);
      ctx.fillStyle = '#fff';
      ctx.fillText('▲', canvas.width * 5 / 6, by + 50);

      ctx.globalAlpha = 1;
    }

    // Touch events
    function handleTouches(e) {
      touchLeft = false; touchRight = false; touchJump = false;
      const touches = e.touches;
      for (let i = 0; i < touches.length; i++) {
        const tx = touches[i].clientX;
        const ty = touches[i].clientY;
        const third = canvas.width / 3;
        if (ty > canvas.height - 120) {
          if (tx < third) touchLeft = true;
          else if (tx < third * 2) touchRight = true;
          else touchJump = true;
        } else {
          touchJump = true;
        }
      }
    }
    
    // Click/tap handler for shop
    function handleCanvasClick(e) {
      if (state !== 'shop') return;
      
      const rect = canvas.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const clickY = e.clientY - rect.top;
      
      // Create cube list for collision detection
      const cubeEntries = Object.entries(CUBE_SKINS).sort((a, b) => {
        const aIsChallenge = a[1].currency === 'challenge';
        const bIsChallenge = b[1].currency === 'challenge';
        if (aIsChallenge !== bIsChallenge) return aIsChallenge ? 1 : -1;
        return a[1].price - b[1].price;
      });
      const cubesPerRow = 4;
      const cubeBoxSize = 100;
      const spacing = 20;
      
      cubeEntries.forEach((entry, idx) => {
        const [skinKey, skinData] = entry;
        const row = Math.floor(idx / cubesPerRow);
        const col = idx % cubesPerRow;
        const x = canvas.width / 2 - (cubesPerRow * (cubeBoxSize + spacing)) / 2 + col * (cubeBoxSize + spacing);
        const y = 140 + row * (cubeBoxSize + spacing + 60) - shopScrollY;
        
        // Check if click is within cube box
        if (clickX >= x && clickX <= x + cubeBoxSize && clickY >= y && clickY <= y + cubeBoxSize) {
          const ownedCubes = playerData.owned_cubes ? playerData.owned_cubes.split(',').map(c => c.trim()) : [];
          const isOwned = ownedCubes.includes(skinKey);
          const isSelected = playerData.selected_cube === skinKey;
          
          if (isOwned) {
            // Already owned - equip it if not already equipped
            if (!isSelected) {
              playerData.selected_cube = skinKey;
              savePlayerData();
            }
          } else {
            // Not owned - try to buy it
            if (skinData.currency === 'challenge') {
              // Challenge point cube
              const canAffordChallenge = (playerData.challenge_points || 0) >= (skinData.challengePrice || 0);
              if (canAffordChallenge) {
                playerData.challenge_points -= skinData.challengePrice;
                if (!ownedCubes.includes(skinKey)) {
                  ownedCubes.push(skinKey);
                }
                playerData.owned_cubes = ownedCubes.join(', ');
                playerData.selected_cube = skinKey;
                savePlayerData();
              }
            } else {

              const canAfford = playerData.total_coins >= skinData.price;
              if (canAfford) {
                playerData.total_coins -= skinData.price;
                if (!ownedCubes.includes(skinKey)) {
                  ownedCubes.push(skinKey);

      editorMouseX = (e.clientX - rect.left - editorPanX) / editorZoom;
      editorMouseY = (e.clientY - rect.top - editorPanY) / editorZoom;
      
      if (e.button === 2) {
        // Right click - select or delete
        editorSelected = null;
        editorLevel.platforms.forEach((pl, idx) => {
          if (editorMouseX >= pl.x && editorMouseX <= pl.x + pl.w && editorMouseY >= pl.y && editorMouseY <= pl.y + pl.h) {
            editorSelected = { type: 'platform', index: idx };

        });
        editorLevel.coins.forEach((c, idx) => {
          if (Math.abs(editorMouseX - (c.x + 8)) < 12 && Math.abs(editorMouseY - (c.y + 8)) < 12) {

            editorSelected = { type: 'obstacle', index: idx };
          }
        });
        editorLevel.powerups.forEach((p, idx) => {
          if (editorMouseX >= p.x && editorMouseX <= p.x + p.w && editorMouseY >= p.y && editorMouseY <= p.y + p.w) {
            editorSelected = { type: 'powerup', index: idx };
          }
        });
        
        // Check start marker
        if (Math.abs(editorMouseX - editorLevel.startX) < 20 && Math.abs(editorMouseY - editorLevel.startY) < 20) {
          editorSelected = { type: 'start' };
        }
        
        // Check finish marker
        if (Math.abs(editorMouseX - editorLevel.finishX) < 20 && Math.abs(editorMouseY - editorLevel.finishY) < 20) {
          editorSelected = { type: 'finish' };
        }
        
        // If something selected and delete tool active, delete it
        if (editorSelected && editorTool === 'delete') {
          const { type, index } = editorSelected;
          if (type === 'platform') editorLevel.platforms.splice(index, 1);
          else if (type === 'coin') editorLevel.coins.splice(index, 1);
          else if (type === 'spike') editorLevel.spikes.splice(index, 1);
          else if (type === 'obstacle') editorLevel.obstacles.splice(index, 1);
          else if (type === 'powerup') editorLevel.powerups.splice(index, 1);

        }
      } else {
        // Left click - start placement drag
        editorDragging = true;
        editorDragStart = { x: editorMouseX, y: editorMouseY };
      }
    }, false);
    
    canvas.addEventListener('mousemove', e => {
      if (state !== 'editor') return;
      const rect = canvas.getBoundingClientRect();
      editorMouseX = (e.clientX - rect.left - editorPanX) / editorZoom;
      editorMouseY = (e.clientY - rect.top - editorPanY) / editorZoom;

    canvas.addEventListener('mouseup', e => {
      if (state !== 'editor' || !editorDragging) return;
      editorDragging = false;
      
      const x1 = Math.min(editorDragStart.x, editorMouseX);
      const y1 = Math.min(editorDragStart.y, editorMouseY);
      const x2 = Math.max(editorDragStart.x, editorMouseX);
      const y2 = Math.max(editorDragStart.y, editorMouseY);
      const w = x2 - x1;
      const h = y2 - y1;
      
      if (w > 10 && h > 10) {
        if (editorTool === 'platform') {
          editorLevel.platforms.push({ x: x1, y: y1, w, h, type: editorPlatformType, oy: y1, crumbleTimer: 0, crumbling: false, visible: true });
        } else if (editorTool === 'coin') {
          editorLevel.coins.push({ x: x1, y: y1, w: 16, h: 16, collected: false });
        } else if (editorTool === 'spike') {
          editorLevel.spikes.push({ x: x1, y: y1, w: Math.max(20, w), h: 16, type: 0 });
        } else if (editorTool === 'obstacle') {
          editorLevel.obstacles.push({ x: x1, y: y1, w: 24, h: 24, vx: 2, minX: x1, maxX: x2, type: 'spike' });
        } else if (editorTool === 'powerup') {
          editorLevel.powerups.push({ x: x1, y: y1, w: 14, h: 14, collected: false, type: 'jumpboost' });
        } else if (editorTool === 'start') {
          editorLevel.startX = (x1 + x2) / 2;
          editorLevel.startY = (y1 + y2) / 2;
        } else if (editorTool === 'finish') {
          editorLevel.finishX = (x1 + x2) / 2;
          editorLevel.finishY = (y1 + y2) / 2;
        }
      }
    }, false);
    
    canvas.addEventListener('contextmenu', e => {
      if (state === 'editor') e.preventDefault();
    }, false);
    
    canvas.addEventListener('click', handleCanvasClick);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); handleTouches(e); handleCanvasClick(e.touches[0]); }, { passive: false });
    canvas.addEventListener('touchmove', e => { e.preventDefault(); handleTouches(e); }, { passive: false });
    canvas.addEventListener('touchend', e => { e.preventDefault(); handleTouches(e); }, { passive: false });
    
    // Scroll wheel for shop
    canvas.addEventListener('wheel', e => {
      if (state !== 'shop') return;
      e.preventDefault();
      
      const cubeEntries = Object.entries(CUBE_SKINS);
      const cubesPerRow = 4;
      const cubeBoxSize = 100;
      const spacing = 20;
      const contentHeight = Math.ceil(cubeEntries.length / cubesPerRow) * (cubeBoxSize + spacing + 60);
      const maxScroll = Math.max(0, contentHeight - (canvas.height - 200));
      
      shopScrollY += e.deltaY > 0 ? 30 : -30;
      shopScrollY = Math.max(0, Math.min(maxScroll, shopScrollY));
    }, { passive: false });

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }
    loop();
