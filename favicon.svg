<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Blue cube body (isometric view) -->
  <!-- Front face (yellow) -->
  <polygon points="8,10 16,6 24,10 16,14" fill="#fbbf24" stroke="#b45309" stroke-width="1"/>
  
  <!-- Left face (blue) -->
  <polygon points="8,10 8,22 16,26 16,14" fill="#3b82f6" stroke="#1e40af" stroke-width="1"/>
  
  <!-- Right face (darker blue) -->
  <polygon points="16,14 16,26 24,22 24,10" fill="#2563eb" stroke="#1e40af" stroke-width="1"/>
  
  <!-- Highlight on front face -->
  <line x1="11" y1="10" x2="14" y2="12" stroke="#fbbf24" stroke-width="0.5" opacity="0.6"/>
</svg>
